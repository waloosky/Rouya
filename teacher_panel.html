<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>لوحة الأدمن</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family:'Tajawal',sans-serif; background:#0f172a; color:#f1f5f9; padding:2rem 1rem; direction:rtl; }
    .container { max-width: 800px; margin: auto; }
    h1 { font-size:20px; font-weight:700; margin-bottom:1.5rem; }
    .user-card {
      background:#1e293b; border:1px solid #334155; border-radius:12px;
      padding:1rem 1.25rem; margin-bottom:.75rem;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
    }
    .user-info p   { font-size:14px; font-weight:500; }
    .user-info span{ font-size:12px; color:#64748b; }
    .badge-pending { background:#451a03; color:#fb923c; border:1px solid #92400e; font-size:11px; padding:3px 10px; border-radius:999px; }
    .badge-active  { background:#052e16; color:#4ade80; border:1px solid #166534; font-size:11px; padding:3px 10px; border-radius:999px; }
    .approve-btn {
      padding:8px 18px; border:none; border-radius:8px;
      background:#0ea5e9; color:#0f172a; font-size:13px; font-weight:700;
      font-family:'Tajawal',sans-serif; cursor:pointer; white-space:nowrap;
      transition:opacity .15s;
    }
    .approve-btn:hover    { opacity:.9; }
    .approve-btn:disabled { opacity:.4; cursor:not-allowed; }
    .reject-btn {
      padding:8px 18px; border:1px solid #991b1b; border-radius:8px;
      background:transparent; color:#f87171; font-size:13px;
      font-family:'Tajawal',sans-serif; cursor:pointer;
      transition:background .15s;
    }
    .reject-btn:hover { background:#450a0a; }
    .actions { display:flex; gap:8px; }
    .empty { color:#64748b; text-align:center; padding:2rem; }
  </style>
</head>
<body>
<div class="container">
  <h1>🔐 لوحة الأدمن — طلبات التسجيل</h1>
  <div id="usersList"><p class="empty">جارٍ التحميل...</p></div>
</div>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, onValue, update, remove }
    from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
  import { getAuth, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCj9UxvluAtmPVNbLHsl4blTEUA94PEOvI",
    authDomain:        "interactive-rouya.firebaseapp.com",
    projectId:         "interactive-rouya",
    storageBucket:     "interactive-rouya.firebasestorage.app",
    messagingSenderId: "164882328808",
    appId:             "1:164882328808:web:868e0251ae47c583a0ed5d",
    databaseURL:       "https://interactive-rouya-default-rtdb.firebaseio.com"
  };

  const app  = initializeApp(firebaseConfig);
  const db   = getDatabase(app);
  const auth = getAuth(app);

  // تحقق أن المستخدم مدرس
  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'index.html'; return; }

    const { getDatabase: gdb, ref: r, get } =
      await import("https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js");
    const snap = await get(ref(db, 'users/' + user.uid));
    if (!snap.exists() || snap.val().role !== 'teacher') {
      window.location.href = 'student_panel.html';
      return;
    }

    loadUsers();
  });

  function loadUsers() {
    onValue(ref(db, 'users'), (snapshot) => {
      const list = document.getElementById('usersList');
      if (!snapshot.exists()) { list.innerHTML = '<p class="empty">لا يوجد مستخدمون</p>'; return; }

      let html = '';
      snapshot.forEach((child) => {
        const u = child.val();
        const uid = child.key;
        if (u.role === 'teacher') return; // تجاهل المدرسين

        const badgeClass = u.status === 'active' ? 'badge-active' : 'badge-pending';
        const badgeText  = u.status === 'active' ? 'مفعّل' : 'معلق';
        const gradeText  = u.grade === 'first_mid' ? 'الأول متوسط' : 'الثاني متوسط';

        html += `
          <div class="user-card">
            <div class="user-info">
              <p>${u.displayName || 'بدون اسم'}</p>
              <span>${u.email} — ${gradeText}</span>
            </div>
            <div class="actions">
              <span class="${badgeClass}">${badgeText}</span>
              ${u.status === 'pending' ? `
                <button class="approve-btn" onclick="approveUser('${uid}')">✓ موافقة</button>
                <button class="reject-btn"  onclick="rejectUser('${uid}')">✗ رفض</button>
              ` : ''}
            </div>
          </div>`;
      });

      list.innerHTML = html || '<p class="empty">لا يوجد طلاب مسجلون</p>';
    });
  }

  // ✅ تفعيل الطالب
  window.approveUser = async (uid) => {
    await update(ref(db, 'users/' + uid), { status: 'active' });
  };

  // ✅ رفض وحذف الطالب
  window.rejectUser = async (uid) => {
    if (confirm('هل تريد رفض وحذف هذا الطالب؟')) {
      await remove(ref(db, 'users/' + uid));
    }
  };
</script>
</body>
</html>
