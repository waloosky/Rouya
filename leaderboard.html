<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة المتصدرين - رؤيا</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      padding: 2rem 1rem;
      direction: rtl;
    }

    .container { max-width: 640px; margin: auto; }

    /* ---- رأس الصفحة ---- */
    .page-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 1.25rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #1e293b;
    }

    .header-icon {
      width: 48px; height: 48px;
      border-radius: 12px;
      background: #422006;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0;
    }

    .page-header h1 { font-size: 20px; font-weight: 700; }
    .page-header p  { font-size: 13px; color: #94a3b8; margin-top: 3px; }

    .btn-back {
      margin-right: auto;
      padding: 8px 14px;
      border-radius: 8px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      font-family: 'Tajawal', sans-serif;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      display: flex; align-items: center; gap: 4px;
      transition: background .15s;
    }
    .btn-back:hover { background: #243044; }

    /* ---- البطاقات الثلاث الأوائل ---- */
    .podium {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 12px;
      margin-bottom: 2rem;
      padding: 0 1rem;
    }

    .podium-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex: 1;
    }

    .podium-avatar {
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .podium-name {
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      color: #f1f5f9;
      max-width: 90px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .podium-score {
      font-size: 11px;
      color: #64748b;
    }

    .podium-stand {
      width: 100%;
      border-radius: 8px 8px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    /* المركز الأول */
    .podium-item.first .podium-avatar {
      width: 60px; height: 60px; font-size: 22px;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      box-shadow: 0 0 20px rgba(245,158,11,0.4);
    }
    .podium-item.first .podium-stand {
      height: 80px;
      background: linear-gradient(180deg, #92400e, #451a03);
    }

    /* المركز الثاني */
    .podium-item.second .podium-avatar {
      width: 50px; height: 50px; font-size: 18px;
      background: linear-gradient(135deg, #94a3b8, #64748b);
      box-shadow: 0 0 15px rgba(148,163,184,0.3);
    }
    .podium-item.second .podium-stand {
      height: 60px;
      background: linear-gradient(180deg, #334155, #1e293b);
    }

    /* المركز الثالث */
    .podium-item.third .podium-avatar {
      width: 44px; height: 44px; font-size: 16px;
      background: linear-gradient(135deg, #cd7c2f, #92400e);
      box-shadow: 0 0 12px rgba(205,124,47,0.3);
    }
    .podium-item.third .podium-stand {
      height: 45px;
      background: linear-gradient(180deg, #451a03, #1c0a00);
    }

    /* ---- قائمة باقي الطلاب ---- */
    .section-label {
      font-size: 12px;
      font-weight: 500;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 12px;
    }

    .rank-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 8px;
      transition: background .15s;
    }

    .rank-item:hover { background: #243044; }
    .rank-item.me    { border-color: #1d4ed8; background: #1e2d4a; }

    .rank-num {
      width: 28px;
      font-size: 14px;
      font-weight: 700;
      color: #64748b;
      text-align: center;
      flex-shrink: 0;
    }

    .rank-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: #1e3a5f;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #93c5fd;
      flex-shrink: 0;
    }

    .rank-name { font-size: 14px; font-weight: 600; flex: 1; }
    .rank-me-label {
      font-size: 10px;
      color: #60a5fa;
      background: #1e3a5f;
      border: 1px solid #1d4ed8;
      border-radius: 999px;
      padding: 2px 8px;
    }

    .rank-score {
      font-size: 14px;
      font-weight: 700;
      color: #38bdf8;
      flex-shrink: 0;
    }

    /* ---- تحميل ---- */
    .loading-msg, .empty-msg {
      text-align: center;
      padding: 2rem;
      color: #64748b;
      font-size: 14px;
    }

    /* ---- شريط التنقل ---- */
    .bottom-nav {
      position: fixed;
      bottom: 0; right: 0; left: 0;
      background: #131c2e;
      border-top: 1px solid #1e293b;
      display: flex;
      z-index: 50;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0 8px;
      text-decoration: none;
      color: #475569;
      font-size: 10px;
      gap: 3px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Tajawal', sans-serif;
      transition: color .15s;
    }
    .nav-item .nav-icon { font-size: 18px; }
    .nav-item.active, .nav-item:hover { color: #38bdf8; }

    body { padding-bottom: 80px; }
  </style>
</head>
<body>
<div class="container">

  <!-- رأس الصفحة -->
  <div class="page-header">
    <div class="header-icon">🏆</div>
    <div>
      <h1>لوحة المتصدرين</h1>
      <p>أوائل الطلبة بناءً على الاختبارات</p>
    </div>
    <a href="student_panel.html" class="btn-back">← رجوع</a>
  </div>

  <!-- المنصة (أول 3) -->
  <div class="podium" id="podium">
    <div class="loading-msg">جارٍ تحميل المتصدرين...</div>
  </div>

  <!-- باقي الترتيب -->
  <div class="section-label">📋 ترتيب عام</div>
  <div id="rankList">
    <div class="loading-msg">جارٍ التحميل...</div>
  </div>

</div>

<!-- شريط التنقل -->
<div class="bottom-nav">
  <a href="student_panel.html" class="nav-item">
    <span class="nav-icon">📚</span>
    دروسي
  </a>
  <button class="nav-item active">
    <span class="nav-icon">🏆</span>
    المتصدرون
  </button>
  <a href="student_panel.html" class="nav-item">
    <span class="nav-icon">🔔</span>
    إشعاراتي
  </a>
</div>

<script type="module">
  import { auth, db, ref, onValue, requireAuth } from './auth.js';

  let myUID = null;

  requireAuth('student', {
    onSuccess: (user) => {
      myUID = user.uid;
      loadLeaderboard();
    }
  });

  function loadLeaderboard() {
    onValue(ref(db, 'leaderboard'), (snap) => {
      if (!snap.exists()) {
        document.getElementById('podium').innerHTML = '<div class="empty-msg">لا توجد بيانات بعد</div>';
        document.getElementById('rankList').innerHTML = '';
        return;
      }

      // ترتيب تنازلي
      const entries = Object.entries(snap.val())
        .map(([uid, v]) => ({ uid, name: v.name || 'مجهول', score: v.totalScore || 0 }))
        .sort((a, b) => b.score - a.score);

      renderPodium(entries.slice(0, 3));
      renderList(entries, entries.slice(0, 3).length);
    });
  }

  function getInitials(name) {
    return name.split(' ').map(n => n[0]).join('').slice(0, 2);
  }

  function renderPodium(top) {
    if (top.length === 0) {
      document.getElementById('podium').innerHTML = '<div class="empty-msg">لا يوجد متصدرون بعد</div>';
      return;
    }

    const order = [top[1], top[0], top[2]].filter(Boolean); // 2nd - 1st - 3rd
    const classes = ['second', 'first', 'third'];
    const medals  = ['🥈', '🥇', '🥉'];

    document.getElementById('podium').innerHTML = order.map((p, i) => {
      if (!p) return '';
      const cls   = classes[i];
      const medal = medals[i];
      const isMe  = p.uid === myUID;
      return `
        <div class="podium-item ${cls}">
          <div class="podium-avatar">${getInitials(p.name)}</div>
          <div class="podium-name">${p.name}${isMe ? ' (أنت)' : ''}</div>
          <div class="podium-score">${p.score} نقطة</div>
          <div class="podium-stand">${medal}</div>
        </div>`;
    }).join('');
  }

  function renderList(entries, skipCount) {
    if (entries.length <= skipCount) {
      document.getElementById('rankList').innerHTML = '<div class="empty-msg">لا يوجد طلاب آخرون</div>';
      return;
    }

    document.getElementById('rankList').innerHTML = entries.slice(skipCount).map((p, i) => {
      const rank = skipCount + i + 1;
      const isMe = p.uid === myUID;
      return `
        <div class="rank-item ${isMe ? 'me' : ''}">
          <div class="rank-num">${rank}</div>
          <div class="rank-avatar">${getInitials(p.name)}</div>
          <div class="rank-name">
            ${p.name}
            ${isMe ? '<span class="rank-me-label">أنت</span>' : ''}
          </div>
          <div class="rank-score">${p.score} نقطة</div>
        </div>`;
    }).join('');
  }
</script>
</body>
</html>
