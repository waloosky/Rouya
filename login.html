<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تسجيل الدخول - منصة رؤيا</title>
</head>
<body>
    <div class="card">
        <h2>تسجيل الدخول</h2>
        <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
        <input type="password" id="loginPassword" placeholder="كلمة المرور">
        <button id="loginBtn">دخول</button>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

        const firebaseConfig = { /* إعداداتك هنا */ };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                alert("يرجى ملء جميع الحقول.");
                return;
            }

            btn.disabled = true;
            btn.textContent = "جارٍ الدخول...";

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const snapshot = await get(ref(db, 'users/' + user.uid));
                const userData = snapshot.val();

                if (!userData) {
                    alert("❌ لم يتم العثور على بيانات المستخدم.");
                    await signOut(auth);
                    return;
                }

                if (userData.status === 'pending') {
                    alert("⚠️ حسابك قيد المراجعة. يرجى انتظار موافقة الأستاذ وليد.");
                    await signOut(auth);
                } else {
                    window.location.href = userData.role === 'admin'
                        ? "admin_panel.html"
                        : "student_panel.html";
                }
            } catch (error) {
                const messages = {
                    'auth/wrong-password': "كلمة المرور غير صحيحة.",
                    'auth/user-not-found': "البريد الإلكتروني غير مسجل.",
                    'auth/too-many-requests': "تم تجاوز عدد المحاولات. حاول لاحقاً."
                };
                alert(messages[error.code] || "خطأ: " + error.message);
            } finally {
                btn.disabled = false;
                btn.textContent = "دخول";
            }
        });
    </script>
</body>
</html>
