<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الطالب - دروسي</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://www.youtube.com/iframe_api"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* منع لقطة الشاشة */
    body {
      font-family: 'Tajawal', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      padding: 2rem 1rem;
      direction: rtl;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    .container { max-width: 720px; margin: auto; }

    /* رأس الصفحة */
    .page-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 1.25rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid #1e293b;
    }
    .avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: #1e3a5f;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: #93c5fd;
      flex-shrink: 0;
    }
    .page-header h1 { font-size: 20px; font-weight: 700; }
    .page-header p  { font-size: 13px; color: #94a3b8; margin-top: 3px; }

    .header-actions {
      margin-right: auto;
      display: flex; align-items: center; gap: 10px;
    }
    .icon-btn {
      position: relative;
      width: 40px; height: 40px;
      border-radius: 10px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8; font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s;
      text-decoration: none;
    }
    .icon-btn:hover { background: #243044; border-color: #475569; }
    .notif-badge {
      position: absolute; top: -4px; left: -4px;
      width: 16px; height: 16px; border-radius: 50%;
      background: #ef4444; font-size: 9px; font-weight: 700; color: #fff;
      display: none; align-items: center; justify-content: center;
    }
    .notif-badge.show { display: flex; }

    /* لوحة الإشعارات */
    .notif-panel {
      display: none; position: fixed;
      top: 0; right: 0; bottom: 0; width: 320px;
      background: #131c2e; border-left: 1px solid #1e293b;
      z-index: 100; flex-direction: column;
      box-shadow: -8px 0 30px rgba(0,0,0,0.5);
    }
    .notif-panel.open { display: flex; }
    .notif-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid #1e293b;
    }
    .notif-header h2 { font-size: 16px; font-weight: 700; }
    .close-btn { background: none; border: none; color: #64748b; font-size: 20px; cursor: pointer; }
    .close-btn:hover { color: #f1f5f9; }
    .notif-list { overflow-y: auto; flex: 1; padding: 12px; }
    .notif-item {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 10px; padding: 12px 14px; margin-bottom: 10px;
    }
    .notif-item.unread { border-color: #1d4ed8; background: #1e2d4a; }
    .notif-item .notif-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .notif-item .notif-body  { font-size: 12px; color: #94a3b8; line-height: 1.5; }
    .notif-item .notif-time  { font-size: 11px; color: #475569; margin-top: 6px; }
    .notif-empty { text-align: center; color: #475569; padding: 2rem; font-size: 14px; }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
    .overlay.show { display: block; }

    /* ══════════ أزرار المواد ══════════ */
    .section-title {
      font-size: 14px; font-weight: 700; color: #64748b;
      text-transform: uppercase; letter-spacing: .06em;
      margin-bottom: 1rem;
    }

    .subjects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 2rem;
    }

    .subject-btn {
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 16px;
      padding: 20px 12px;
      text-align: center;
      cursor: pointer;
      transition: all .2s;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .subject-btn:hover { border-color: #38bdf8; transform: translateY(-2px); background: #1a2d44; }
    .subject-btn.active { border-color: #38bdf8; background: #0c2033; }
    .subject-icon { font-size: 36px; }
    .subject-name { font-size: 13px; font-weight: 700; color: #f1f5f9; }
    .subject-count { font-size: 11px; color: #64748b; }

    /* ── Skeleton Loading ── */
    @keyframes skeleton-shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton-card {
      min-height: 100px;
      cursor: default;
      background: linear-gradient(90deg, #1e293b 25%, #243348 50%, #1e293b 75%);
      background-size: 800px 100%;
      animation: skeleton-shimmer 1.5s infinite;
      pointer-events: none;
      border-color: transparent !important;
    }

    /* ══════════ قائمة الدروس ══════════ */
    .back-btn {
      display: flex; align-items: center; gap: 8px;
      background: none; border: none; color: #38bdf8;
      font-size: 14px; font-family: 'Tajawal', sans-serif;
      cursor: pointer; margin-bottom: 1.5rem; padding: 0;
    }
    .back-btn:hover { color: #7dd3fc; }

    .subject-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 1.5rem;
    }
    .subject-header-icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: #1e3a5f;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
    }
    .subject-header-name { font-size: 18px; font-weight: 700; }
    .subject-header-sub  { font-size: 12px; color: #64748b; margin-top: 2px; }

    .lessons-list { display: flex; flex-direction: column; gap: 12px; }

    .lesson-item {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 1.2rem 1.5rem;
      cursor: pointer;
      transition: all .2s;
      display: flex; align-items: center; gap: 14px;
    }
    .lesson-item:hover { border-color: #38bdf8; background: #1a2d44; }
    .lesson-num-badge {
      width: 36px; height: 36px; border-radius: 10px;
      background: #0ea5e920;
      color: #38bdf8; font-size: 14px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .lesson-item-info { flex: 1; }
    .lesson-item-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .lesson-item-meta  { font-size: 12px; color: #64748b; display: flex; gap: 12px; }

    .lesson-status-badge {
      font-size: 11px; font-weight: 600;
      padding: 4px 10px; border-radius: 999px;
      flex-shrink: 0;
    }
    .status-done    { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .status-open    { background: #0c2033; color: #38bdf8; border: 1px solid #1d4ed8; }
    .status-locked  { background: #0f172a; color: #475569; border: 1px solid #334155; }

    /* ══════════ تفاصيل الدرس ══════════ */
    .lesson-detail-header {
      margin-bottom: 1.5rem;
    }
    .lesson-detail-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
    .lesson-detail-sub   { font-size: 13px; color: #94a3b8; line-height: 1.6; }

    /* الفيديو */
    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 */
      height: 0; overflow: hidden;
      border-radius: 14px;
      background: #000;
      margin-bottom: 1.5rem;
      border: 1px solid #334155;
    }
    .video-wrapper iframe {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      border: none; border-radius: 14px;
    }
    .no-video {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 14px; padding: 2rem;
      text-align: center; color: #475569;
      font-size: 14px; margin-bottom: 1.5rem;
    }

    /* التقدم في الدرس */
    .progress-card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 14px; padding: 1.2rem 1.5rem;
      margin-bottom: 1.5rem;
    }
    .progress-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .progress-track {
      flex: 1; height: 8px; background: #0f172a;
      border-radius: 999px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 999px;
      background: #38bdf8; transition: width .4s;
    }
    .progress-fill.done { background: #22c55e; }
    .progress-text { font-size: 12px; color: #64748b; white-space: nowrap; }

    .dots-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .dot {
      width: 28px; height: 28px; border-radius: 50%;
      border: 1px solid #334155;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #64748b; font-weight: 500;
    }
    .dot.watched { background: #052e16; border-color: #166534; color: #4ade80; }

    .attended-stamp {
      display: none; align-items: center; gap: 6px;
      font-size: 12px; color: #93c5fd; margin-top: 8px;
    }
    .attended-stamp.show { display: flex; }

    /* زر الامتحان */
    .btn-exam {
      width: 100%; padding: 13px;
      border-radius: 10px; font-size: 15px; font-weight: 700;
      font-family: 'Tajawal', sans-serif;
      cursor: pointer; border: 1px solid #334155;
      background: transparent; color: #94a3b8;
      transition: all .2s; margin-top: 8px;
    }
    .btn-exam.active {
      background: #0ea5e9; border-color: #0ea5e9;
      color: #0f172a; font-weight: 700;
    }
    .btn-exam.active:hover { opacity: .9; }
    .btn-exam:disabled { opacity: .4; cursor: not-allowed; }
    .btn-exam.done-exam {
      background: #052e16; border-color: #166534;
      color: #4ade80; cursor: default;
    }

    /* رسالة الخطأ */
    .error-msg {
      display: none; padding: 10px 14px;
      background: #450a0a; color: #f87171;
      border: 1px solid #991b1b;
      border-radius: 8px; font-size: 13px; margin-bottom: 1rem;
    }

    /* التنقل السفلي */
    .bottom-nav {
      position: fixed; bottom: 0; right: 0; left: 0;
      background: #131c2e; border-top: 1px solid #1e293b;
      display: flex; z-index: 50;
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; padding: 10px 0 8px;
      text-decoration: none; color: #475569;
      font-size: 10px; gap: 3px; cursor: pointer;
      background: none; border: none;
      font-family: 'Tajawal', sans-serif;
      transition: color .15s;
    }
    .nav-icon { font-size: 18px; }
    .nav-item.active, .nav-item:hover { color: #38bdf8; }

    body { padding-bottom: 80px; }

    /* شاشة الحجب عند التبديل */
    .blur-overlay {
      display: none; position: fixed; inset: 0;
      background: #0f172a;
      z-index: 9999;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      font-size: 18px; color: #f87171; font-weight: 700;
    }
    .blur-overlay.show { display: flex; }

    .empty-state { text-align: center; padding: 3rem 1rem; color: #475569; font-size: 14px; }
    .empty-icon  { font-size: 48px; margin-bottom: 12px; }

    @media (max-width: 480px) {
      .subjects-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- شاشة الحجب عند تبديل النافذة -->
<div class="blur-overlay" id="blurOverlay">
  <div style="font-size:48px">🚫</div>
  <div>تم اكتشاف تبديل النافذة!</div>
  <div style="font-size:13px;color:#94a3b8;font-weight:400">يُرجى العودة للاستمرار</div>
</div>

<div class="container">

  <!-- رأس الصفحة -->
  <div class="page-header">
    <div class="avatar" id="userAvatar">؟</div>
    <div>
      <h1 id="welcomeMsg">جارٍ التحميل...</h1>
      <p id="gradeMsg">يرجى الانتظار</p>
    </div>
    <div class="header-actions">
      <a href="leaderboard.html" class="icon-btn" title="المتصدرون">🏆</a>
      <button class="icon-btn" id="notifBtn" onclick="toggleNotif()" title="الإشعارات">
        🔔
        <span class="notif-badge" id="notifBadge">0</span>
      </button>
    </div>
  </div>

  <!-- رسالة خطأ -->
  <div id="errorMsg" class="error-msg"></div>

  <!-- ══ شاشة المواد ══ -->
  <div id="screen-subjects">
    <div class="section-title">📚 اختر المادة</div>
    <div class="subjects-grid" id="subjectsGrid">
      <!-- Skeleton cards أثناء التحميل -->
      <div class="subject-btn skeleton-card" aria-hidden="true"></div>
      <div class="subject-btn skeleton-card" aria-hidden="true"></div>
      <div class="subject-btn skeleton-card" aria-hidden="true"></div>
      <div class="subject-btn skeleton-card" aria-hidden="true"></div>
      <div class="subject-btn skeleton-card" aria-hidden="true"></div>
      <div class="subject-btn skeleton-card" aria-hidden="true"></div>
      <div class="subject-btn skeleton-card" aria-hidden="true"></div>
    </div>
  </div>

  <!-- ══ شاشة الدروس ══ -->
  <div id="screen-lessons" style="display:none">
    <button class="back-btn" onclick="goBack('subjects')">← العودة للمواد</button>
    <div class="subject-header">
      <div class="subject-header-icon" id="detailSubjectIcon">📚</div>
      <div>
        <div class="subject-header-name" id="detailSubjectName">المادة</div>
        <div class="subject-header-sub" id="detailSubjectCount">0 دروس</div>
      </div>
    </div>
    <div id="lessonsContainer"></div>
  </div>

  <!-- ══ شاشة تفاصيل الدرس ══ -->
  <div id="screen-detail" style="display:none">
    <button class="back-btn" onclick="goBack('lessons')">← العودة للدروس</button>
    <div class="lesson-detail-header">
      <div class="lesson-detail-title" id="detailLessonTitle">عنوان الدرس</div>
      <div class="lesson-detail-sub" id="detailLessonDesc"></div>
    </div>

    <!-- الفيديو -->
    <div id="videoArea"></div>

    <!-- التقدم -->
    <div class="progress-card" id="progressCard">
      <div style="font-size:13px;font-weight:700;margin-bottom:10px;">📺 تقدّم المشاهدة</div>
      <div class="dots-row" id="detailDots"></div>
      <div class="progress-row">
        <div class="progress-track">
          <div class="progress-fill" id="detailProgressFill" style="width:0%"></div>
        </div>
        <span class="progress-text" id="detailProgressText">0 / 3 مشاهدات</span>
      </div>
      <div class="attended-stamp" id="detailStamp">📋 تم احتساب حضورك لهذا الدرس</div>
    </div>

    <!-- زر الامتحان -->
    <button class="btn-exam" id="detailExamBtn" disabled>
      شاهد 3 مرات لفتح الامتحان
    </button>
  </div>

</div>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="toggleNotif()"></div>

<!-- لوحة الإشعارات -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-header">
    <h2>🔔 الإشعارات</h2>
    <button class="close-btn" onclick="toggleNotif()">✕</button>
  </div>
  <div class="notif-list" id="notifList">
    <div class="notif-empty">لا توجد إشعارات جديدة</div>
  </div>
</div>

<!-- شريط التنقل السفلي -->
<div class="bottom-nav">
  <button class="nav-item active">
    <span class="nav-icon">📚</span>
    دروسي
  </button>
  <a href="leaderboard.html" class="nav-item">
    <span class="nav-icon">🏆</span>
    المتصدرون
  </a>
  <button class="nav-item" onclick="toggleNotif()">
    <span class="nav-icon">🔔</span>
    إشعاراتي
  </button>
  <button class="nav-item" onclick="signOutUser()">
    <span class="nav-icon">🚪</span>
    خروج
  </button>
</div>

<script type="module">
  /* ── استيراد من الوحدة المركزية auth.js ── */
  import {
    auth, db,
    ref, onValue, get, update, signOut,
    requireAuth, signOutUser as authSignOut
  } from './auth.js';

  const SUBJECTS = [
    { id: 'islamic',   name: 'التربية الإسلامية', icon: '🌙' },
    { id: 'arabic',    name: 'اللغة العربية',      icon: '📖' },
    { id: 'english',   name: 'اللغة الإنكليزية',  icon: '🌐' },
    { id: 'math',      name: 'الرياضيات',          icon: '📐' },
    { id: 'chemistry', name: 'الكيمياء',           icon: '🧪' },
    { id: 'biology',   name: 'الأحياء',            icon: '🧬' },
    { id: 'physics',   name: 'الفيزياء',           icon: '⚛️' },
  ];

  let currentUID   = null;
  let currentGrade = null;
  let allLessons   = {};
  let allProgress  = {};
  let currentSubject = null;
  let currentLessonId = null;
  let progressUnsubscribe = null;

  // ══ منع لقطة الشاشة ══
  document.addEventListener('keydown', (e) => {
    // PrintScreen, F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
    if (
      e.key === 'PrintScreen' ||
      e.keyCode === 44 ||
      (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) ||
      (e.ctrlKey && e.key === 'u') ||
      e.key === 'F12'
    ) {
      e.preventDefault();
      e.stopPropagation();
      alert('🚫 غير مسموح بلقطة الشاشة أو أدوات المطور');
      return false;
    }
  });

  document.addEventListener('contextmenu', (e) => e.preventDefault());

  // حجب الصفحة عند تبديل النافذة (للاختبارات)
  document.addEventListener('visibilitychange', () => {
    const overlay = document.getElementById('blurOverlay');
    if (document.hidden) {
      overlay.classList.add('show');
    } else {
      setTimeout(() => overlay.classList.remove('show'), 1500);
    }
  });

  // ══ تسجيل الخروج — يستخدم authSignOut من auth.js ══
  window.signOutUser = () => authSignOut('index.html');

  // ══ الإشعارات ══
  window.toggleNotif = () => {
    const panel = document.getElementById('notifPanel');
    const overlay = document.getElementById('overlay');
    const isOpen = panel.classList.contains('open');
    panel.classList.toggle('open', !isOpen);
    overlay.classList.toggle('show', !isOpen);
    if (!isOpen && currentUID) {
      update(ref(db, `notifications/${currentUID}/lastSeen`), { ts: Date.now() });
      document.getElementById('notifBadge').classList.remove('show');
    }
  };

  // ══ Auth — يستخدم requireAuth المركزي ══
  requireAuth('student', {
    onSuccess: (user) => {
      currentUID = user.uid;
      const initials = user.displayName
        ? user.displayName.split(' ').map(n => n[0]).join('').slice(0, 2)
        : '؟';
      document.getElementById('userAvatar').textContent = initials;
      document.getElementById('welcomeMsg').textContent = 'أهلاً بك يا ' + (user.displayName || '');
      loadStudentData(user);
      loadNotifications(user.uid);
    }
  });

  // ══ تحميل بيانات الطالب ══
  async function loadStudentData(user) {
    try {
      const userSnap = await get(ref(db, 'users/' + user.uid));
      if (!userSnap.exists()) return showError('لم يتم العثور على بيانات الطالب');

      const grade = userSnap.val().grade;
      currentGrade = grade;

      const gradeNames = {
        sixth_prep:  'الصف السادس الإعدادي',
        fifth_prep:  'الصف الخامس الإعدادي',
        fourth_prep: 'الصف الرابع الإعدادي',
        first_mid:   'الصف الأول متوسط',
        second_mid:  'الصف الثاني متوسط'
      };
      document.getElementById('gradeMsg').textContent = gradeNames[grade] || grade;

      // استمع للدروس
      onValue(ref(db, 'lessons'), (snap) => {
        allLessons = {};
        if (snap.exists()) {
          const all = snap.val();
          for (const id in all) {
            const l = all[id];
            if (!l.grade || l.grade === grade) {
              allLessons[id] = l;
            }
          }
        }
        renderSubjects();
      });

      // استمع للتقدم
      onValue(ref(db, `progress/${user.uid}`), (snap) => {
        allProgress = snap.exists() ? snap.val() : {};
        renderSubjects();
        // تحديث تفاصيل الدرس الحالي إن كان مفتوحاً
        if (currentLessonId) updateDetailProgress(currentLessonId);
      });

    } catch (e) {
      showError('خطأ في تحميل البيانات: ' + e.message);
    }
  }

  // ══ عرض المواد ══
  function renderSubjects() {
    const grid = document.getElementById('subjectsGrid');

    // احسب عدد الدروس لكل مادة
    const counts = {};
    for (const id in allLessons) {
      const subj = allLessons[id].subject || 'other';
      counts[subj] = (counts[subj] || 0) + 1;
    }

    // أظهر فقط المواد التي فيها دروس
    const available = SUBJECTS.filter(s => counts[s.id] > 0);

    if (available.length === 0) {
      grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">📭</div>
        <p>لا توجد دروس منشورة لصفك بعد</p>
      </div>`;
      return;
    }

    grid.innerHTML = available.map(s => `
      <div class="subject-btn" onclick="selectSubject('${s.id}')">
        <span class="subject-icon">${s.icon}</span>
        <span class="subject-name">${s.name}</span>
        <span class="subject-count">${counts[s.id]} ${counts[s.id] === 1 ? 'درس' : 'دروس'}</span>
      </div>
    `).join('');
  }

  // ══ اختيار مادة ══
  window.selectSubject = function(subjectId) {
    currentSubject = subjectId;
    const subj = SUBJECTS.find(s => s.id === subjectId) || { name: subjectId, icon: '📚' };

    document.getElementById('detailSubjectIcon').textContent = subj.icon;
    document.getElementById('detailSubjectName').textContent = subj.name;

    // فلتر الدروس لهذه المادة
    const subjectLessons = Object.entries(allLessons)
      .filter(([, l]) => l.subject === subjectId)
      .sort(([, a], [, b]) => (a.createdAt || 0) - (b.createdAt || 0));

    document.getElementById('detailSubjectCount').textContent = subjectLessons.length + ' دروس';

    renderLessonsList(subjectLessons);
    showScreen('lessons');
  };

  // ══ عرض قائمة الدروس ══
  function renderLessonsList(lessons) {
    const container = document.getElementById('lessonsContainer');
    if (lessons.length === 0) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><p>لا توجد دروس في هذه المادة</p></div>`;
      return;
    }

    container.innerHTML = `<div class="lessons-list">${lessons.map(([id, l], i) => {
      const prog    = allProgress[id] || {};
      const views   = prog.view_count || 0;
      const MAX     = 3;
      const done    = views >= MAX;
      const examined = prog.score !== undefined;

      let statusBadge, statusClass;
      if (examined) {
        statusBadge = '✅ مكتمل';
        statusClass = 'status-done';
      } else if (done) {
        statusBadge = '✏️ جاهز للاختبار';
        statusClass = 'status-open';
      } else {
        statusBadge = `📺 ${views}/${MAX} مشاهدة`;
        statusClass = 'status-locked';
      }

      return `
        <div class="lesson-item" onclick="openLesson('${id}')">
          <div class="lesson-num-badge">${i + 1}</div>
          <div class="lesson-item-info">
            <div class="lesson-item-title">${l.title}</div>
            <div class="lesson-item-meta">
              <span>🧪 ${l.questions ? Object.keys(l.questions).length : 0} أسئلة</span>
            </div>
          </div>
          <span class="lesson-status-badge ${statusClass}">${statusBadge}</span>
        </div>`;
    }).join('')}</div>`;
  }

  // ══ فتح تفاصيل الدرس ══
  window.openLesson = function(lessonId) {
    currentLessonId = lessonId;
    const lesson = allLessons[lessonId];
    if (!lesson) return;

    document.getElementById('detailLessonTitle').textContent = lesson.title;
    document.getElementById('detailLessonDesc').textContent  = lesson.description || lesson.desc || '';

    // عرض الفيديو
    const videoArea = document.getElementById('videoArea');
    if (lesson.videoUrl) {
      const videoId = extractYouTubeId(lesson.videoUrl);
      if (videoId) {
        videoArea.innerHTML = `
          <div class="video-wrapper">
            <iframe
              src="https://www.youtube.com/embed/${videoId}?rel=0&enablejsapi=1"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen>
            </iframe>
          </div>`;
        // تسجيل مشاهدة عند تشغيل الفيديو
        setupVideoTracking(lessonId, videoId);
      } else {
        videoArea.innerHTML = `<div class="no-video">🎬 رابط الفيديو غير صالح</div>`;
      }
    } else {
      videoArea.innerHTML = `<div class="no-video">🎬 لا يوجد فيديو لهذا الدرس</div>`;
    }

    updateDetailProgress(lessonId);
    showScreen('detail');
  };

  // ══ استخراج معرف يوتيوب ══
  function extractYouTubeId(url) {
    const patterns = [
      /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&\n?#]+)/,
      /youtube\.com\/shorts\/([^&\n?#]+)/
    ];
    for (const p of patterns) {
      const m = url.match(p);
      if (m) return m[1];
    }
    return null;
  }

  // ══ متابعة مشاهدة الفيديو (كل مشاهدة = جلسة كاملة) ══
  let videoWatchTimer = null;

  function setupVideoTracking(lessonId, videoId) {
    // نسجّل مشاهدة بعد 60 ثانية من البث
    if (videoWatchTimer) clearTimeout(videoWatchTimer);
    videoWatchTimer = setTimeout(async () => {
      if (!currentUID) return;
      const snap = await get(ref(db, `progress/${currentUID}/${lessonId}`));
      const cur  = snap.exists() ? (snap.val().view_count || 0) : 0;
      if (cur < 3) {
        await update(ref(db, `progress/${currentUID}/${lessonId}`), {
          view_count: cur + 1,
          lastView:   Date.now()
        });
      }
    }, 60000); // بعد دقيقة
  }

  // ══ تحديث واجهة التقدم في تفاصيل الدرس ══
  function updateDetailProgress(lessonId) {
    const prog  = allProgress[lessonId] || {};
    const views = prog.view_count || 0;
    const MAX   = 3;
    const done  = views >= MAX;
    const pct   = Math.min((views / MAX) * 100, 100);

    // نقاط
    let dots = '';
    for (let i = 1; i <= MAX; i++) {
      dots += i <= views
        ? `<div class="dot watched">✓</div>`
        : `<div class="dot">${i}</div>`;
    }
    document.getElementById('detailDots').innerHTML = dots;

    // شريط التقدم
    const fill = document.getElementById('detailProgressFill');
    fill.style.width = pct + '%';
    fill.classList.toggle('done', done);
    document.getElementById('detailProgressText').textContent = `${views} / ${MAX} مشاهدات`;

    // ختم الحضور
    document.getElementById('detailStamp').classList.toggle('show', done);

    // زر الامتحان
    const btn = document.getElementById('detailExamBtn');
    const examined = prog.score !== undefined;

    if (examined) {
      // أجرى الاختبار مسبقاً
      const scoreVal = prog.score;
      btn.className = 'btn-exam done-exam';
      btn.disabled  = false;
      btn.textContent = `✅ أجريت الاختبار — نتيجتك: ${scoreVal}%`;
      btn.onclick = null;
    } else if (done) {
      btn.className = 'btn-exam active';
      btn.disabled  = false;
      btn.textContent = '✏️ أداء الاختبار الآن';
      btn.onclick = () => {
        window.location.href = `exam.html?id=${lessonId}`;
      };
    } else {
      btn.className = 'btn-exam';
      btn.disabled  = true;
      const remaining = MAX - views;
      btn.textContent = `شاهد ${remaining} ${remaining === 1 ? 'مرة أخرى' : 'مرات أخرى'} لفتح الاختبار`;
      btn.onclick = null;
    }
  }

  // ══ التنقل بين الشاشات ══
  window.goBack = function(screen) {
    if (screen === 'subjects') {
      if (videoWatchTimer) clearTimeout(videoWatchTimer);
      currentLessonId = null;
    }
    showScreen(screen);
  };

  function showScreen(name) {
    ['subjects', 'lessons', 'detail'].forEach(s => {
      document.getElementById('screen-' + s).style.display = s === name ? 'block' : 'none';
    });
  }

  // ══ الإشعارات ══
  function loadNotifications(uid) {
    onValue(ref(db, `notifications/${uid}`), (snap) => {
      const list  = document.getElementById('notifList');
      const badge = document.getElementById('notifBadge');
      if (!snap.exists()) {
        list.innerHTML = '<div class="notif-empty">لا توجد إشعارات جديدة</div>';
        return;
      }
      const data     = snap.val();
      const lastSeen = data.lastSeen?.ts || 0;
      const items    = data.items || {};
      const sorted   = Object.entries(items).sort((a, b) => b[1].ts - a[1].ts);
      let unread = 0;
      list.innerHTML = sorted.map(([, n]) => {
        const isUnread = n.ts > lastSeen;
        if (isUnread) unread++;
        return `
          <div class="notif-item ${isUnread ? 'unread' : ''}">
            <div class="notif-title">${n.icon || '📢'} ${n.title}</div>
            <div class="notif-body">${n.body}</div>
            <div class="notif-time">${formatTime(n.ts)}</div>
          </div>`;
      }).join('');
      if (unread > 0) {
        badge.textContent = unread;
        badge.classList.add('show');
      }
    });
  }

  function formatTime(ts) {
    const m = Math.floor((Date.now() - ts) / 60000);
    if (m < 1)  return 'الآن';
    if (m < 60) return `منذ ${m} دقيقة`;
    const h = Math.floor(m / 60);
    if (h < 24) return `منذ ${h} ساعة`;
    return `منذ ${Math.floor(h / 24)} يوم`;
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>
</body>
