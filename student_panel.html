<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الطالب - دروسي</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://www.youtube.com/iframe_api"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      padding: 2rem 1rem;
      direction: rtl;
    }

    .container { max-width: 720px; margin: auto; }

    /* ---- رأس الصفحة ---- */
    .page-header {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 1.25rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid #1e293b;
    }

    .avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: #1e3a5f;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: #93c5fd;
      flex-shrink: 0;
    }

    .page-header h1 { font-size: 20px; font-weight: 700; }
    .page-header p  { font-size: 13px; color: #94a3b8; margin-top: 3px; }

    /* ---- أزرار الشريط العلوي ---- */
    .header-actions {
      margin-right: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .icon-btn {
      position: relative;
      width: 40px; height: 40px;
      border-radius: 10px;
      background: #1e293b;
      border: 1px solid #334155;
      color: #94a3b8;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s;
      text-decoration: none;
    }
    .icon-btn:hover { background: #243044; border-color: #475569; }

    .notif-badge {
      position: absolute;
      top: -4px; left: -4px;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #ef4444;
      font-size: 9px;
      font-weight: 700;
      color: #fff;
      display: flex; align-items: center; justify-content: center;
      display: none;
    }
    .notif-badge.show { display: flex; }

    /* ---- لوحة الإشعارات ---- */
    .notif-panel {
      display: none;
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 320px;
      background: #131c2e;
      border-left: 1px solid #1e293b;
      z-index: 100;
      flex-direction: column;
      box-shadow: -8px 0 30px rgba(0,0,0,0.5);
    }
    .notif-panel.open { display: flex; }

    .notif-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid #1e293b;
    }
    .notif-header h2 { font-size: 16px; font-weight: 700; }
    .close-btn {
      background: none; border: none; color: #64748b;
      font-size: 20px; cursor: pointer; line-height: 1;
    }
    .close-btn:hover { color: #f1f5f9; }

    .notif-list { overflow-y: auto; flex: 1; padding: 12px; }

    .notif-item {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .notif-item.unread { border-color: #1d4ed8; background: #1e2d4a; }
    .notif-item .notif-title { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
    .notif-item .notif-body  { font-size: 12px; color: #94a3b8; line-height: 1.5; }
    .notif-item .notif-time  { font-size: 11px; color: #475569; margin-top: 6px; }
    .notif-empty { text-align: center; color: #475569; padding: 2rem; font-size: 14px; }

    .overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 99;
    }
    .overlay.show { display: block; }

    /* ---- بطاقة الحضور الذكي ---- */
    .attendance-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 1rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .attendance-icon { font-size: 24px; flex-shrink: 0; }
    .attendance-info { flex: 1; }
    .attendance-info .att-title { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
    .attendance-info .att-sub   { font-size: 12px; color: #64748b; }
    .attendance-count {
      font-size: 22px;
      font-weight: 700;
      color: #38bdf8;
      flex-shrink: 0;
    }

    .section-label {
      font-size: 12px;
      font-weight: 500;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 1rem;
    }

    /* ---- بطاقة الدرس ---- */
    .lesson-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1rem;
    }

    .lesson-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .lesson-title { font-size: 15px; font-weight: 700; }
    .lesson-desc  { font-size: 13px; color: #94a3b8; margin-top: 4px; line-height: 1.5; }

    .badge {
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 999px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge-locked   { background: #0f172a; color: #64748b; border: 1px solid #334155; }
    .badge-unlocked { background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .badge-attended { background: #1e3a5f; color: #93c5fd; border: 1px solid #1d4ed8; }

    /* ---- نقاط المشاهدة ---- */
    .dots-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .dot {
      width: 24px; height: 24px;
      border-radius: 50%;
      border: 1px solid #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: #64748b;
      font-weight: 500;
    }

    .dot.watched { background: #052e16; border-color: #166534; color: #4ade80; }

    /* ---- شريط التقدم ---- */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .progress-track {
      flex: 1;
      height: 6px;
      background: #0f172a;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: #38bdf8;
      transition: width .4s ease;
    }

    .progress-fill.done { background: #22c55e; }
    .progress-text { font-size: 12px; color: #64748b; white-space: nowrap; }

    /* ---- علامة الحضور ---- */
    .attended-stamp {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #93c5fd;
      margin-bottom: 12px;
    }
    .attended-stamp.show { display: flex; }

    /* ---- زر الامتحان ---- */
    .btn-exam {
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      font-family: 'Tajawal', sans-serif;
      cursor: pointer;
      border: 1px solid #334155;
      background: transparent;
      color: #94a3b8;
      transition: all .15s;
    }

    .btn-exam.active {
      background: #0ea5e9;
      border-color: #0ea5e9;
      color: #0f172a;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-exam.active:hover { opacity: .9; }
    .btn-exam:disabled     { opacity: .4; cursor: not-allowed; }

    /* ---- رسالة الخطأ ---- */
    .error-msg {
      display: none;
      padding: 10px 14px;
      background: #450a0a;
      color: #f87171;
      border: 1px solid #991b1b;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 1rem;
    }

    /* ---- شريط التنقل ---- */
    .bottom-nav {
      position: fixed;
      bottom: 0; right: 0; left: 0;
      background: #131c2e;
      border-top: 1px solid #1e293b;
      display: flex;
      z-index: 50;
    }
    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0 8px;
      text-decoration: none;
      color: #475569;
      font-size: 10px;
      gap: 3px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: 'Tajawal', sans-serif;
      transition: color .15s;
    }
    .nav-item .nav-icon { font-size: 18px; }
    .nav-item.active, .nav-item:hover { color: #38bdf8; }

    body { padding-bottom: 80px; }
  </style>
</head>
<body>
<div class="container">

  <!-- رأس الصفحة -->
  <div class="page-header">
    <div class="avatar" id="userAvatar">؟</div>
    <div>
      <h1 id="welcomeMsg">جارٍ التحميل...</h1>
      <p id="gradeMsg">يرجى الانتظار</p>
    </div>
    <div class="header-actions">
      <!-- زر لوحة المتصدرين -->
      <a href="leaderboard.html" class="icon-btn" title="المتصدرون">🏆</a>
      <!-- زر الإشعارات -->
      <button class="icon-btn" id="notifBtn" onclick="toggleNotif()" title="الإشعارات">
        🔔
        <span class="notif-badge" id="notifBadge">0</span>
      </button>
    </div>
  </div>

  <!-- رسالة خطأ -->
  <div id="errorMsg" class="error-msg"></div>

  <!-- بطاقة الحضور الذكي -->
  <div class="attendance-card" id="attendanceCard" style="display:none">
    <div class="attendance-icon">📋</div>
    <div class="attendance-info">
      <div class="att-title">سجل الحضور الإلكتروني</div>
      <div class="att-sub">أكمل ٥ مشاهدات لكل درس ليُحسب حضورك</div>
    </div>
    <div class="attendance-count" id="attendanceCount">0</div>
  </div>

  <!-- قائمة الدروس -->
  <div class="section-label">📚 دروسي</div>
  <div id="lessonsContainer"></div>

</div>

<!-- Overlay لإغلاق لوحة الإشعارات -->
<div class="overlay" id="overlay" onclick="toggleNotif()"></div>

<!-- لوحة الإشعارات -->
<div class="notif-panel" id="notifPanel">
  <div class="notif-header">
    <h2>🔔 الإشعارات</h2>
    <button class="close-btn" onclick="toggleNotif()">✕</button>
  </div>
  <div class="notif-list" id="notifList">
    <div class="notif-empty">لا توجد إشعارات جديدة</div>
  </div>
</div>

<!-- شريط التنقل السفلي -->
<div class="bottom-nav">
  <button class="nav-item active">
    <span class="nav-icon">📚</span>
    دروسي
  </button>
  <a href="leaderboard.html" class="nav-item">
    <span class="nav-icon">🏆</span>
    المتصدرون
  </a>
  <button class="nav-item" onclick="toggleNotif()">
    <span class="nav-icon">🔔</span>
    إشعاراتي
  </button>
  <button class="nav-item" onclick="signOutUser()">
    <span class="nav-icon">🚪</span>
    خروج
  </button>
</div>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getDatabase, ref, onValue, get, update }
    from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
  import { getAuth, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCj9UxvluAtmPVNbLHsl4blTEUA94PEOvI",
    authDomain:        "interactive-rouya.firebaseapp.com",
    projectId:         "interactive-rouya",
    storageBucket:     "interactive-rouya.firebasestorage.app",
    messagingSenderId: "164882328808",
    appId:             "1:164882328808:web:868e0251ae47c583a0ed5d",
    databaseURL:       "https://interactive-rouya-default-rtdb.firebaseio.com"
  };

  const app  = initializeApp(firebaseConfig);
  const db   = getDatabase(app);
  const auth = getAuth(app);

  let currentUID = null;

  // ---- تسجيل الخروج ----
  window.signOutUser = async () => {
    await signOut(auth);
    window.location.href = 'index.html';
  };

  // ---- فتح/إغلاق الإشعارات ----
  window.toggleNotif = () => {
    const panel = document.getElementById('notifPanel');
    const overlay = document.getElementById('overlay');
    const isOpen = panel.classList.contains('open');
    panel.classList.toggle('open', !isOpen);
    overlay.classList.toggle('show', !isOpen);

    // عند الفتح: علّم الإشعارات كـ"مقروءة"
    if (!isOpen && currentUID) {
      update(ref(db, `notifications/${currentUID}/lastSeen`), { ts: Date.now() });
      document.getElementById('notifBadge').classList.remove('show');
    }
  };

  // ---- مراقبة حالة المستخدم ----
  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUID = user.uid;
      const initials = user.displayName
        ? user.displayName.split(' ').map(n => n[0]).join('').slice(0, 2)
        : '؟';
      document.getElementById('userAvatar').textContent = initials;
      document.getElementById('welcomeMsg').textContent = 'أهلاً بك يا ' + user.displayName;
      loadStudentData(user);
      loadNotifications(user.uid);
    } else {
      window.location.href = 'index.html';
    }
  });

  // ---- جلب الإشعارات ----
  function loadNotifications(uid) {
    onValue(ref(db, `notifications/${uid}`), (snap) => {
      const list = document.getElementById('notifList');
      const badge = document.getElementById('notifBadge');

      if (!snap.exists()) {
        list.innerHTML = '<div class="notif-empty">لا توجد إشعارات جديدة</div>';
        return;
      }

      const data = snap.val();
      const lastSeen = data.lastSeen?.ts || 0;
      const items = data.items || {};

      const sorted = Object.entries(items).sort((a, b) => b[1].ts - a[1].ts);
      let unreadCount = 0;

      list.innerHTML = sorted.map(([k, n]) => {
        const isUnread = n.ts > lastSeen;
        if (isUnread) unreadCount++;
        const timeAgo = formatTime(n.ts);
        return `
          <div class="notif-item ${isUnread ? 'unread' : ''}">
            <div class="notif-title">${n.icon || '📢'} ${n.title}</div>
            <div class="notif-body">${n.body}</div>
            <div class="notif-time">${timeAgo}</div>
          </div>`;
      }).join('');

      if (unreadCount > 0) {
        badge.textContent = unreadCount;
        badge.classList.add('show');
      }
    });
  }

  function formatTime(ts) {
    const diff = Date.now() - ts;
    const m = Math.floor(diff / 60000);
    if (m < 1) return 'الآن';
    if (m < 60) return `منذ ${m} دقيقة`;
    const h = Math.floor(m / 60);
    if (h < 24) return `منذ ${h} ساعة`;
    return `منذ ${Math.floor(h / 24)} يوم`;
  }

  // ---- جلب بيانات الطالب ----
  async function loadStudentData(user) {
    try {
      const userSnap = await get(ref(db, 'users/' + user.uid));
      if (!userSnap.exists()) return showError('لم يتم العثور على بيانات الطالب');

      const grade = userSnap.val().grade;
      const subjectId = userSnap.val().subject || null;

      // عرض اسم الصف
      const gradeNames = {
        sixth_prep:  'الصف السادس الإعدادي',
        fifth_prep:  'الصف الخامس الإعدادي',
        fourth_prep: 'الصف الرابع الإعدادي',
        first_mid:   'الصف الأول متوسط',
        second_mid:  'الصف الثاني متوسط'
      };
      document.getElementById('gradeMsg').textContent = gradeNames[grade] || grade;

      document.getElementById('attendanceCard').style.display = 'flex';

      // ✅ الإصلاح: قراءة الدروس من المسار العام وتصفيتها حسب الصف والمادة
      onValue(ref(db, 'lessons'), (snap) => {
        if (!snap.exists()) return showError('لا توجد دروس متاحة بعد');
        const allLessons = snap.val();
        // تصفية الدروس: فقط دروس الصف السادس الإعدادي (grade === sixth_prep أو grade مطابق)
        const filtered = {};
        for (const id in allLessons) {
          const lesson = allLessons[id];
          // إظهار الدروس التي تخص هذا الصف
          // إذا لم يكن للدرس grade محدد أو كان grade === grade الطالب
          if (!lesson.grade || lesson.grade === grade) {
            // إذا كانت للطالب مادة محددة، اعرض فقط دروس تلك المادة
            if (!subjectId || lesson.subject === subjectId || !lesson.subject) {
              filtered[id] = lesson;
            }
          }
        }
        if (Object.keys(filtered).length === 0) return showError('لا توجد دروس منشورة لصفك بعد');
        renderLessons(filtered, user.uid);
      });

    } catch (e) {
      showError('خطأ في تحميل البيانات: ' + e.message);
    }
  }

  // ---- عرض الدروس ----
  let attendedCount = 0;

  function renderLessons(lessons, uid) {
    const container = document.getElementById('lessonsContainer');
    container.innerHTML = '';
    attendedCount = 0;
    for (const id in lessons) {
      watchProgress(uid, id, lessons[id], container);
    }
  }

  function watchProgress(uid, lessonId, lessonData, container) {
    onValue(ref(db, `progress/${uid}/${lessonId}`), (snap) => {
      const views    = (snap.val()?.view_count) || 0;
      const attended = views >= 5;

      let card = document.getElementById('card-' + lessonId);
      if (!card) {
        card = document.createElement('div');
        card.id = 'card-' + lessonId;
        container.appendChild(card);
      }
      card.outerHTML = buildCard(lessonId, lessonData, views, attended);

      // تحديث عداد الحضور
      const allCards = document.querySelectorAll('.lesson-card');
      let cnt = 0;
      document.querySelectorAll('[data-attended="true"]').forEach(() => cnt++);
      document.getElementById('attendanceCount').textContent = cnt + ' / ' + Object.keys(window._lessonCount || {}).length;
    });
  }

  function buildCard(id, data, views, attended) {
    const MAX_VIEWS  = 5;
    const isUnlocked = views >= MAX_VIEWS;
    const pct        = Math.min((views / MAX_VIEWS) * 100, 100);

    let dotsHTML = '';
    for (let i = 1; i <= MAX_VIEWS; i++) {
      dotsHTML += i <= views
        ? `<div class="dot watched">✓</div>`
        : `<div class="dot">${i}</div>`;
    }

    const attendedBadge = attended
      ? '<span class="badge badge-attended">✅ حاضر</span>'
      : `<span class="badge ${isUnlocked ? 'badge-unlocked' : 'badge-locked'}">${isUnlocked ? '🔓 مفتوح' : '🔒 مقفل'}</span>`;

    const attendedStamp = attended
      ? '<div class="attended-stamp show">📋 تم احتساب حضورك لهذا الدرس</div>'
      : '';

    return `
      <div class="lesson-card" id="card-${id}" data-attended="${attended}">
        <div class="lesson-top">
          <div>
            <div class="lesson-title">${data.title}</div>
            <div class="lesson-desc">${data.desc || ''}</div>
          </div>
          ${attendedBadge}
        </div>

        <div class="dots-row">${dotsHTML}</div>

        ${attendedStamp}

        <div class="progress-row">
          <div class="progress-track">
            <div class="progress-fill ${isUnlocked ? 'done' : ''}" style="width:${pct}%"></div>
          </div>
          <span class="progress-text">${views} / ${MAX_VIEWS} مشاهدات</span>
        </div>

        <button
          class="btn-exam ${isUnlocked ? 'active' : ''}"
          ${isUnlocked ? `onclick="goToExam('${id}')"` : 'disabled'}>
          ${isUnlocked
            ? '✏️ أداء الامتحان الآن'
            : `شاهد ${MAX_VIEWS - views} ${MAX_VIEWS - views === 1 ? 'مرة أخرى' : 'مرات أخرى'} لفتح الامتحان`}
        </button>
      </div>`;
  }

  window.goToExam = (lessonId) => {
    window.location.href = `exam.html?id=${lessonId}`;
  };

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }
</script>
</body>
</html>
