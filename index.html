<button id="loginBtn">سجل الدخول باستخدام Gmail</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider }
    from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCj9UxvluAtmPVNbLHsl4blTEUA94PEOvI",           // ← من Firebase Console
    authDomain:        "myapp.firebaseapp.com",
    projectId:         "myapp",
    storageBucket:     "myapp.appspot.com",
    messagingSenderId: "164882328808",
    appId:             "1:164882328808:web:..."
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // ✅ ربط الحدث من داخل الـ module بدل onclick=""
  document.getElementById("loginBtn").addEventListener("click", () => {
    const provider = new GoogleAuthProvider();
    signInWithPopup(auth, provider)
      .then(result => {
        alert("أهلاً بك يا " + result.user.displayName);
      })
      .catch(error => {
        console.error("خطأ:", error.code, error.message);
      });
  });
</script>
