<script type="module">
  // استيراد الدوال اللازمة من Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

  // ضع الكود الذي نسخته من Firebase هنا
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_ID",
    appId: "YOUR_APP_ID"
  };

  // تهيئة Firebase
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // دالة تسجيل الدخول
  window.loginWithGoogle = function() {
    const provider = new GoogleAuthProvider();
    signInWithPopup(auth, provider)
      .then((result) => {
        console.log("تم تسجيل الدخول بنجاح:", result.user.displayName);
        alert("أهلاً بك يا " + result.user.displayName);
      })
      .catch((error) => {
        console.error("خطأ في تسجيل الدخول:", error);
      });
  };
</script>

<button onclick="loginWithGoogle()">سجل الدخول باستخدام Gmail</button>
