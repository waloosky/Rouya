<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منصة رؤيا التعليمية - تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan: #00e5ff;
      --amber: #ffb300;
      --glass-bg: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.10);
      --glass-border-strong: rgba(0,229,255,0.35);
      --text-primary: #f0f6ff;
      --text-muted: rgba(180,210,240,0.6);
      --surface: #0d1117;
    }
    html, body {
      min-height: 100vh;
      font-family: 'Tajawal', sans-serif;
      background: var(--surface);
      color: var(--text-primary);
      direction: rtl;
      overflow-x: hidden;
    }
    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem 1rem; }
    .card {
      width: 100%;
      max-width: 440px;
      background: rgba(13,17,23,0.6);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 2.5rem 2rem;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 0 0 1px rgba(0,229,255,0.08) inset, 0 32px 64px rgba(0,0,0,0.5);
    }
    .tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 1.5rem; }
    .tab-btn, .submit-btn, .google-btn, .lang-btn, .role-card { font-family: 'Tajawal', sans-serif; }
    .tab-btn {
      padding: 10px;
      border: 1px solid transparent;
      background: transparent;
      color: rgba(180,210,240,0.45);
      font-size: 14px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
    }
    .tab-btn.active { background: rgba(0,229,255,0.1); border-color: rgba(0,229,255,0.25); color: var(--cyan); }
    .fields { display: flex; flex-direction: column; gap: 14px; }
    .field-label { font-size: 12px; color: var(--text-muted); font-weight: 600; display: block; margin-bottom: 6px; }
    .field-input, .field-select {
      width: 100%; padding: 11px 16px; border: 1px solid var(--glass-border); border-radius: 10px;
      background: rgba(0,229,255,0.03); color: var(--text-primary); font-size: 14px; outline: none;
    }
    .submit-btn {
      width: 100%; padding: 13px; border: 1px solid rgba(0,229,255,0.4); border-radius: 10px;
      background: linear-gradient(135deg, rgba(0,229,255,0.15) 0%, rgba(0,229,255,0.08) 100%);
      color: var(--cyan); font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .submit-btn.teacher-btn { border-color: rgba(255,179,0,0.4); background: linear-gradient(135deg, rgba(255,179,0,0.15) 0%, rgba(255,179,0,0.08) 100%); color: var(--amber); }
    .google-btn {
      width: 100%; padding: 11px; border: 1px solid var(--glass-border); border-radius: 10px;
      background: rgba(255,255,255,0.03); color: rgba(180,210,240,0.6); font-size: 13.5px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .msg { display: none; padding: 11px 16px; border-radius: 10px; font-size: 13px; margin-bottom: 1rem; }
    .msg.error { display: block; background: rgba(255,80,80,0.1); color: #ff6b6b; border: 1px solid rgba(255,80,80,0.25); }
    .msg.success { display: block; background: rgba(0,229,255,0.08); color: var(--cyan); border: 1px solid rgba(0,229,255,0.25); }
    .msg.warning { display: block; background: rgba(255,179,0,0.08); color: var(--amber); border: 1px solid rgba(255,179,0,0.25); }
    .pending-box { display: none; padding: 16px; border-radius: 12px; border: 1px solid rgba(255,179,0,0.3); background: rgba(255,179,0,0.05); text-align: center; margin-top: 16px; }
    .pending-box.show { display: block; }
  </style>
</head>
<body>
<div class="page">
  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">تسجيل الدخول</button>
      <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">حساب جديد</button>
    </div>

    <div id="statusMsg" class="msg"></div>

    <div id="loginForm">
      <div class="fields">
        <div>
          <label class="field-label" id="lbl-email">البريد الإلكتروني</label>
          <input class="field-input" type="email" id="loginEmail" placeholder="example@gmail.com">
        </div>
        <div>
          <label class="field-label" id="lbl-pass">كلمة المرور</label>
          <input class="field-input" type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <button class="submit-btn" id="loginBtn">→ دخول</button>
      </div>

      <div style="margin: 1.2rem 0; text-align: center; color: rgba(180,210,240,0.3);">أو</div>

      <button class="google-btn" id="googleLoginBtn">
        <img src="https://www.google.com/favicon.ico" width="16" height="16" alt="G">
        <span id="lbl-google">الدخول بحساب Google</span>
      </button>

      <div class="pending-box" id="pendingBox">
        <div>⏳</div>
        <div id="pb-title">حسابك قيد المراجعة</div>
        <div id="pb-desc">تم إرسال بياناتك للأستاذ. ستتمكن من الدخول بعد الموافقة على حسابك.</div>
      </div>
    </div>

    <div id="registerForm" style="display:none">
      <div class="fields">
        <div>
          <label class="field-label">نوع الحساب</label>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
            <div class="role-card" id="roleStudent" onclick="selectRole('student')" style="padding:14px;border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;text-align:center;cursor:pointer;">
              <div>🎓</div>
              <span>طالب</span>
            </div>
            <div class="role-card" id="roleTeacher" onclick="selectRole('teacher')" style="padding:14px;border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;text-align:center;cursor:pointer;">
              <div>📚</div>
              <span>مدرس</span>
            </div>
            <div class="role-card" id="roleAdmin" onclick="selectRole('admin')" style="padding:14px;border:1.5px solid rgba(255,255,255,0.1);border-radius:12px;text-align:center;cursor:pointer;">
              <div>🛡️</div>
              <span>أدمن</span>
            </div>
          </div>
        </div>

        <div>
          <label class="field-label">الاسم الكامل</label>
          <input class="field-input" type="text" id="regName" placeholder="وليد خالد مصطفى">
        </div>
        <div>
          <label class="field-label">البريد الإلكتروني</label>
          <input class="field-input" type="email" id="regEmail" placeholder="example@gmail.com">
        </div>
        <div>
          <label class="field-label">كلمة المرور</label>
          <input class="field-input" type="password" id="regPassword" placeholder="6 أحرف على الأقل">
        </div>
        <div id="gradeField">
          <label class="field-label">الصف الدراسي</label>
          <select class="field-select" id="regGrade">
            <option value="sixth_prep">السادس الإعدادي</option>
            <option value="fifth_prep">الخامس الإعدادي</option>
            <option value="fourth_prep">الرابع الإعدادي</option>
          </select>
        </div>
        <div>
          <label class="field-label">الكود السري</label>
          <input class="field-input" type="text" id="regCode" placeholder="أدخل الكود السري">
        </div>
        <button class="submit-btn" id="registerBtn">✦ إنشاء الحساب</button>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import {
    auth, db, ref, set, get,
    signInWithEmailAndPassword, createUserWithEmailAndPassword,
    signInWithPopup, provider, updateProfile,
    onAuthStateChanged, signOut
  } from './auth.js';

  let isAr = true;
  let currentRole = 'student';

  const STUDENT_CODE = "STUDENT2026";
  const TEACHER_CODE = "TEACHER2026";
  const ADMIN_CODE   = "ADMIN2026";

  window.switchTab = function(tab) {
    const isLogin = tab === 'login';
    document.getElementById('loginForm').style.display = isLogin ? 'block' : 'none';
    document.getElementById('registerForm').style.display = isLogin ? 'none' : 'block';
    document.getElementById('tabLogin').classList.toggle('active', isLogin);
    document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    clearMsg();
    document.getElementById('pendingBox').classList.remove('show');
  };

  window.selectRole = function(role) {
    currentRole = role;
    document.getElementById('roleStudent').style.borderColor = role === 'student' ? '#00e5ff' : 'rgba(255,255,255,0.1)';
    document.getElementById('roleTeacher').style.borderColor = role === 'teacher' ? '#ffb300' : 'rgba(255,255,255,0.1)';
    document.getElementById('roleAdmin').style.borderColor   = role === 'admin'   ? '#ff4444' : 'rgba(255,255,255,0.1)';
    document.getElementById('registerBtn').className = role === 'teacher' ? 'submit-btn teacher-btn' : 'submit-btn';
    document.getElementById('gradeField').style.display = (role === 'teacher' || role === 'admin') ? 'none' : 'block';
  };

  function showMsg(text, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  function clearMsg() {
    const el = document.getElementById('statusMsg');
    el.className = 'msg';
    el.textContent = '';
  }

  function setLoading(id, v) {
    document.getElementById(id).disabled = v;
  }

  function friendlyError(code) {
    const map = {
      'auth/email-already-in-use': ['هذا البريد مسجل مسبقاً', 'Email already registered'],
      'auth/invalid-email': ['البريد الإلكتروني غير صحيح', 'Invalid email address'],
      'auth/wrong-password': ['كلمة المرور غير صحيحة', 'Wrong password'],
      'auth/user-not-found': ['لا يوجد حساب بهذا البريد', 'No account found'],
      'auth/weak-password': ['كلمة المرور ضعيفة جداً', 'Password too weak'],
      'auth/popup-closed-by-user': ['أُغلقت نافذة Google', 'Google popup closed'],
      'auth/invalid-credential': ['بيانات الدخول غير صحيحة', 'Invalid credentials']
    };
    const entry = map[code];
    return entry ? (isAr ? entry[0] : entry[1]) : (isAr ? 'حدث خطأ، حاول مجدداً' : 'An error occurred, try again');
  }

  async function redirectByRole(user) {
    const snap = await get(ref(db, 'users/' + user.uid));
    if (!snap.exists()) return;
    const data = snap.val();

    if (data.status === 'pending') {
      showMsg(isAr ? 'حسابك قيد المراجعة. انتظر موافقة الأستاذ.' : 'Your account is pending approval.', 'warning');
      document.getElementById('pendingBox').classList.add('show');
      await signOut(auth);
      return;
    }

    if (data.role === 'admin') {
      window.location.href = 'admin.html';
      return;
    }

    if (data.role === 'teacher') {
      window.location.href = 'teacher_panel.html';
      return;
    }

    window.location.href = 'student_panel.html';
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) return;
    await redirectByRole(user);
  });

  document.getElementById('registerBtn').addEventListener('click', async () => {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const grade = document.getElementById('regGrade').value;
    const code = document.getElementById('regCode').value.trim();

    if (!name || !email || !password || !code) return showMsg('يرجى تعبئة جميع الحقول', 'error');
    if (password.length < 6) return showMsg('كلمة المرور 6 أحرف على الأقل', 'error');

    if (currentRole === 'student' && code !== STUDENT_CODE) return showMsg('❌ كود الطالب غير صحيح', 'error');
    if (currentRole === 'teacher' && code !== TEACHER_CODE) return showMsg('❌ كود المدرس غير صحيح', 'error');
    if (currentRole === 'admin'   && code !== ADMIN_CODE)   return showMsg('❌ كود الأدمن غير صحيح', 'error');

    try {
      setLoading('registerBtn', true);
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });

      const userData = {
        displayName: name,
        email,
        role: currentRole,
        status: currentRole === 'admin' ? 'active' : 'pending',
        grade: currentRole === 'student' ? grade : null,
        createdAt: Date.now()
      };

      await set(ref(db, 'users/' + cred.user.uid), userData);
      await signOut(auth);

      showMsg(currentRole === 'admin' ? '✅ تم إنشاء حساب الأدمن. يمكنك تسجيل الدخول الآن.' : '✅ تم إنشاء الحساب. انتظر موافقة الأدمن للتفعيل.', 'success');
      ['regName', 'regEmail', 'regPassword', 'regCode'].forEach(id => document.getElementById(id).value = '');
    } catch (e) {
      showMsg(friendlyError(e.code), 'error');
    } finally {
      setLoading('registerBtn', false);
    }
  });

  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    if (!email || !password) return showMsg('يرجى تعبئة الحقول', 'error');

    try {
      setLoading('loginBtn', true);
      await signInWithEmailAndPassword(auth, email, password);
    } catch (e) {
      showMsg(friendlyError(e.code), 'error');
    } finally {
      setLoading('loginBtn', false);
    }
  });

  document.getElementById('googleLoginBtn').addEventListener('click', async () => {
    try {
      const result = await signInWithPopup(auth, provider);
      const snap = await get(ref(db, 'users/' + result.user.uid));
      if (!snap.exists()) {
        await signOut(auth);
        showMsg('⚠️ لا يوجد حساب بهذا البريد. سجّل أولاً.', 'warning');
      }
    } catch (e) {
      showMsg(friendlyError(e.code), 'error');
    }
  });
</script>
</body>
</html>
