<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - منصة الأستاذ وليد</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      direction: rtl;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .logo-icon {
      width: 60px; height: 60px;
      border-radius: 14px;
      background: #1e3a5f;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 12px;
    }

    .logo h1 { font-size: 20px; font-weight: 700; }
    .logo p  { font-size: 13px; color: #94a3b8; margin-top: 4px; }

    /* ---- tabs ---- */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: #0f172a;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.5rem;
    }

    .tab-btn {
      padding: 9px;
      border: none;
      background: transparent;
      color: #64748b;
      font-size: 14px;
      font-family: 'Tajawal', sans-serif;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s;
    }

    .tab-btn.active {
      background: #1e293b;
      color: #f1f5f9;
    }

    /* ---- fields ---- */
    .fields { display: flex; flex-direction: column; gap: 12px; }

    label { font-size: 13px; color: #94a3b8; display: block; margin-bottom: 5px; }

    input, select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 14px;
      font-family: 'Tajawal', sans-serif;
      outline: none;
      transition: border-color .15s;
    }

    input:focus, select:focus { border-color: #38bdf8; }

    .hint {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }

    /* ---- submit ---- */
    .submit-btn {
      width: 100%;
      padding: 12px;
      margin-top: 4px;
      border: none;
      border-radius: 8px;
      background: #0ea5e9;
      color: #0f172a;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Tajawal', sans-serif;
      cursor: pointer;
      transition: opacity .15s;
    }

    .submit-btn:hover    { opacity: .9; }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ---- google ---- */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1rem 0;
      color: #475569;
      font-size: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #334155;
    }

    .google-btn {
      width: 100%;
      padding: 11px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: transparent;
      color: #94a3b8;
      font-size: 14px;
      font-family: 'Tajawal', sans-serif;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .google-btn:hover { background: #243044; }

    /* ---- status messages ---- */
    .msg {
      display: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 1rem;
    }

    .msg.error   { display: block; background: #450a0a; color: #f87171; border: 1px solid #991b1b; }
    .msg.success { display: block; background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .msg.warning { display: block; background: #431407; color: #fb923c; border: 1px solid #9a3412; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🎓</div>
    <h1>منصة الأستاذ وليد</h1>
    <p>التعلم التفاعلي لطلاب المتوسط</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" id="tabLogin"    onclick="switchTab('login')">تسجيل الدخول</button>
    <button class="tab-btn"        id="tabRegister" onclick="switchTab('register')">حساب جديد</button>
  </div>

  <!-- رسالة حالة -->
  <div id="statusMsg" class="msg"></div>

  <!-- ---- نموذج الدخول ---- -->
  <div id="loginForm">
    <div class="fields">
      <div>
        <label for="loginEmail">البريد الإلكتروني</label>
        <input type="email" id="loginEmail" placeholder="example@gmail.com">
      </div>
      <div>
        <label for="loginPassword">كلمة المرور</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button class="submit-btn" id="loginBtn">دخول</button>
    </div>

    <div class="divider">أو</div>

    <button class="google-btn" id="googleLoginBtn">
      <img src="https://www.google.com/favicon.ico" width="16" height="16" alt="Google">
      الدخول بحساب Google
    </button>
  </div>

  <!-- ---- نموذج التسجيل ---- -->
  <div id="registerForm" style="display:none">
    <div class="fields">
      <div>
        <label for="regName">الاسم الكامل</label>
        <input type="text" id="regName" placeholder="أحمد محمد علي">
      </div>
      <div>
        <label for="regEmail">البريد الإلكتروني</label>
        <input type="email" id="regEmail" placeholder="example@gmail.com">
      </div>
      <div>
        <label for="regPassword">كلمة المرور</label>
        <input type="password" id="regPassword" placeholder="6 أحرف على الأقل">
      </div>
      <div>
        <label for="regGrade">الصف الدراسي</label>
        <select id="regGrade">
          <option value="first_mid">الأول متوسط</option>
          <option value="second_mid">الثاني متوسط</option>
        </select>
      </div>
      <div>
        <label for="regCode">الكود السري</label>
        <input type="text" id="regCode" placeholder="أدخل الكود الذي أعطاك إياه الأستاذ">
        <p class="hint">تواصل مع الأستاذ وليد للحصول على الكود</p>
      </div>
      <button class="submit-btn" id="registerBtn">إنشاء الحساب</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
           signInWithPopup, GoogleAuthProvider, updateProfile, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
  import { getDatabase, ref, set, get }
    from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyCj9UxvluAtmPVNbLHsl4blTEUA94PEOvI",
    authDomain:        "interactive-rouya.firebaseapp.com",
    projectId:         "interactive-rouya",
    storageBucket:     "interactive-rouya.firebasestorage.app",
    messagingSenderId: "164882328808",
    appId:             "1:164882328808:web:868e0251ae47c583a0ed5d",
    databaseURL:       "https://interactive-rouya-default-rtdb.firebaseio.com"
  };

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const db       = getDatabase(app);
  const provider = new GoogleAuthProvider();

  // ---- تبديل التبويبات ----
  window.switchTab = (tab) => {
    const isLogin = tab === 'login';
    document.getElementById('loginForm').style.display    = isLogin ? 'block' : 'none';
    document.getElementById('registerForm').style.display = isLogin ? 'none'  : 'block';
    document.getElementById('tabLogin').classList.toggle('active',    isLogin);
    document.getElementById('tabRegister').classList.toggle('active', !isLogin);
    clearMsg();
  };

  // ---- توجيه المستخدم بعد الدخول ----
  onAuthStateChanged(auth, async (user) => {
    if (!user) return;
    await redirectByRole(user);
  });

  async function redirectByRole(user) {
    const snap = await get(ref(db, 'users/' + user.uid));
    if (!snap.exists()) return;

    const data = snap.val();

    // ✅ تحقق من حالة الحساب
    if (data.status === 'pending') {
      showMsg('حسابك قيد المراجعة. سيتم التفعيل قريباً من قِبل الأستاذ وليد.', 'warning');
      await auth.signOut();
      return;
    }

    if (data.role === 'teacher') {
      window.location.href = 'teacher_panel.html';
    } else {
      window.location.href = 'student_panel.html';
    }
  }

  // ---- تسجيل حساب جديد ----
  document.getElementById('registerBtn').addEventListener('click', async () => {
    const name     = document.getElementById('regName').value.trim();
    const email    = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;
    const grade    = document.getElementById('regGrade').value;
    const code     = document.getElementById('regCode').value.trim();

    if (!name || !email || !password || !code)
      return showMsg('يرجى تعبئة جميع الحقول', 'error');

    if (password.length < 6)
      return showMsg('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');

    try {
      // ✅ جلب الكود السري من قاعدة البيانات
      const codeSnap = await get(ref(db, 'config/secretCode'));
      const validCode = codeSnap.exists() ? codeSnap.val() : 'WALID2026';

      if (code !== validCode)
        return showMsg('الكود السري غير صحيح، تواصل مع الأستاذ وليد', 'error');

      setLoading('registerBtn', true);

      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(cred.user, { displayName: name });

      // ✅ حفظ البيانات مع status: 'pending'
      await set(ref(db, 'users/' + cred.user.uid), {
        displayName: name,
        email:       email,
        role:        'student',
        grade:       grade,
        status:      'pending',       // ← معلق حتى موافقة المدرس
        createdAt:   Date.now()
      });

      await auth.signOut();
      showMsg('تم إنشاء حسابك بنجاح! انتظر تفعيله من الأستاذ وليد.', 'success');

    } catch (e) {
      showMsg(friendlyError(e.code), 'error');
    } finally {
      setLoading('registerBtn', false);
    }
  });

  // ---- تسجيل الدخول بالإيميل ----
  document.getElementById('loginBtn').addEventListener('click', async () => {
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) return showMsg('يرجى تعبئة الحقول', 'error');

    try {
      setLoading('loginBtn', true);
      await signInWithEmailAndPassword(auth, email, password);
      // onAuthStateChanged سيتولى التوجيه
    } catch (e) {
      showMsg(friendlyError(e.code), 'error');
    } finally {
      setLoading('loginBtn', false);
    }
  });

  // ---- الدخول بـ Google ----
  document.getElementById('googleLoginBtn').addEventListener('click', async () => {
    try {
      const result = await signInWithPopup(auth, provider);
      const user   = result.user;

      // إذا كان مستخدماً جديداً — أنشئ سجله بحالة pending
      const snap = await get(ref(db, 'users/' + user.uid));
      if (!snap.exists()) {
        await auth.signOut();
        showMsg('يجب التسجيل أولاً بالكود السري للحصول على وصول للمنصة.', 'warning');
        return;
      }
      // onAuthStateChanged سيتولى التوجيه
    } catch (e) {
      showMsg(friendlyError(e.code), 'error');
    }
  });

  // ---- مساعدات ----
  function showMsg(text, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = text;
    el.className   = 'msg ' + type;
  }

  function clearMsg() {
    const el = document.getElementById('statusMsg');
    el.className = 'msg';
  }

  function setLoading(btnId, loading) {
    document.getElementById(btnId).disabled = loading;
  }

  function friendlyError(code) {
    const map = {
      'auth/email-already-in-use':  'هذا البريد مسجل مسبقاً',
      'auth/invalid-email':         'البريد الإلكتروني غير صحيح',
      'auth/wrong-password':        'كلمة المرور غير صحيحة',
      'auth/user-not-found':        'لا يوجد حساب بهذا البريد',
      'auth/weak-password':         'كلمة المرور ضعيفة جداً',
      'auth/popup-closed-by-user':  'تم إغلاق نافذة الدخول',
    };
    return map[code] || 'حدث خطأ، حاول مرة أخرى';
  }
</script>
</body>
</html>
