<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - منصة الأستاذ وليد</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Tajawal', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      direction: rtl;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .logo-icon {
      width: 60px; height: 60px;
      border-radius: 14px;
      background: #1e3a5f;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      margin: 0 auto 12px;
    }

    .logo h1 { font-size: 20px; font-weight: 700; }
    .logo p  { font-size: 13px; color: #94a3b8; margin-top: 4px; }

    /* ---- tabs ---- */
    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: #0f172a;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.5rem;
    }

    .tab-btn {
      padding: 9px;
      border: none;
      background: transparent;
      color: #64748b;
      font-size: 14px;
      font-family: 'Tajawal', sans-serif;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s;
    }

    .tab-btn.active {
      background: #1e293b;
      color: #f1f5f9;
    }

    /* ---- fields ---- */
    .fields { display: flex; flex-direction: column; gap: 12px; }

    label { font-size: 13px; color: #94a3b8; display: block; margin-bottom: 5px; }

    input, select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #0f172a;
      color: #f1f5f9;
      font-size: 14px;
      font-family: 'Tajawal', sans-serif;
      outline: none;
      transition: border-color .15s;
    }

    input:focus, select:focus { border-color: #38bdf8; }

    .hint {
      font-size: 12px;
      color: #64748b;
      margin-top: 4px;
    }

    /* ---- submit ---- */
    .submit-btn {
      width: 100%;
      padding: 12px;
      margin-top: 4px;
      border: none;
      border-radius: 8px;
      background: #0ea5e9;
      color: #0f172a;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Tajawal', sans-serif;
      cursor: pointer;
      transition: opacity .15s;
    }

    .submit-btn:hover    { opacity: .9; }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* ---- google ---- */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1rem 0;
      color: #475569;
      font-size: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #334155;
    }

    .google-btn {
      width: 100%;
      padding: 11px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: transparent;
      color: #94a3b8;
      font-size: 14px;
      font-family: 'Tajawal', sans-serif;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .google-btn:hover { background: #243044; }

    /* ---- status messages ---- */
    .msg {
      display: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 1rem;
    }

    .msg.error   { display: block; background: #450a0a; color: #f87171; border: 1px solid #991b1b; }
    .msg.success { display: block; background: #052e16; color: #4ade80; border: 1px solid #166534; }
    .msg.warning { display: block; background: #431407; color: #fb923c; border: 1px solid #9a3412; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🎓</div>
    <h1>منصة الأستاذ وليد</h1>
    <p>التعلم التفاعلي لطلاب المتوسط</p>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" id="tabLogin"    onclick="switchTab('login')">تسجيل الدخول</button>
    <button class="tab-btn"        id="tabRegister" onclick="switchTab('register')">حساب جديد</button>
  </div>

  <!-- رسالة حالة -->
  <div id="statusMsg" class="msg"></div>

  <!-- ---- نموذج الدخول ---- -->
  <div id="loginForm">
    <div class="fields">
      <div>
        <label for="loginEmail">البريد الإلكتروني</label>
        <input type="email" id="loginEmail" placeholder="example@gmail.com">
      </div>
      <div>
        <label for="loginPassword">كلمة المرور</label>
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
      <button class="submit-btn" id="loginBtn">دخول</button>
    </div>

    <div class="divider">أو</div>

    <button class="google-btn" id="googleLoginBtn">
      <img src="https://www.google.com/favicon.ico" width="16" height="16" alt="Google">
      الدخول بحساب Google
    </button>
  </div>

  <!-- ---- نموذج التسجيل ---- -->
  <div id="registerForm" style="display:none">
    <div class="fields">
      <div>
        <label for="regName">الاسم الكامل</label>
        <input type="text" id="regName" placeholder="أحمد محمد علي">
      </div>
      <div>
        <label for="regEmail">البريد الإلكتروني</label>
        <input type="email" id="regEmail" placeholder="example@gmail.com">
      </div>
      <div>
        <label for="regPassword">كلمة المرور</label>
        <input type="password" id="regPassword" placeholder="6 أحرف على الأقل">
      </div>
      <div>
        <label for="regGrade">الصف الدراسي</label>
        <select id="regGrade">
          <option value="first_mid">الأول متوسط</option>
          <option value="second_mid">الثاني متوسط</option>
        </select>
      </div>
      <div>
        <label for="regCode">الكود السري</label>
        <input type="text" id="regCode" placeholder="أدخل الكود الذي أعطاك إياه الأستاذ">
        <p class="hint">تواصل مع الأستاذ وليد للحصول على الكود</p>
      </div>
      <button class="submit-btn" id="registerBtn">إنشاء الحساب</button>
    </div>
  </div>
</div>
